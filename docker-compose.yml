version: '3.8'
services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PostGreSQL
      POSTGRES_DB: new-medical
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"

  server:
    build: ./server
    command: npm run dev
    volumes:
      - ./server:/usr/src/app
      - ./logs:/usr/src/app/logs
      - ./backups:/backups
    environment:
      - DATABASE_URL=postgresql://postgres:PostGreSQL@postgres:5432/new-medical?schema=public
      - NODE_ENV=development
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - minio

  web:
    build: ./web
    command: npm run dev
    volumes:
      - ./web:/usr/src/app
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  pgdata:
  miniodata:
